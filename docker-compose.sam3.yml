version: '3.8'

services:
  sam3-service:
    build:
      context: ./apps/sam3-service
      dockerfile: Dockerfile
    image: maintenance-sam3:latest
    container_name: maintenance-sam3
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=${SAM3_DEVICE:-cuda}  # cuda or cpu
      - MAX_WORKERS=4
      - LOG_LEVEL=INFO
    volumes:
      # Model cache - persists between restarts
      - sam3-models:/models
      # Optional: Mount local model if you have it
      # - ./models/sam3:/models/sam3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          # Comment out GPU section if using CPU only
    networks:
      - maintenance-network

  # Optional: NGINX reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: maintenance-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sam3-service
    networks:
      - maintenance-network
    profiles:
      - production

volumes:
  sam3-models:
    driver: local

networks:
  maintenance-network:
    driver: bridge