name: Review Apps - Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  pull_request_review:
    types: [submitted]

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check:web
        continue-on-error: false

      - name: Lint
        run: npm run lint:web
        continue-on-error: true

      - name: Run tests
        run: npm run test:web
        continue-on-error: true

      - name: Build web app
        run: npm run build:web
        env:
          NEXT_PUBLIC_APP_URL: https://preview-pr-${{ github.event.pull_request.number }}.vercel.app
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Deploy to Vercel
      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          npm install -g vercel
          cd apps/web

          # Deploy and capture URL
          DEPLOYMENT_URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -o 'https://[^ ]*' | tail -1)
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Create deployment on GitHub
      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'preview',
              required_contexts: [],
              auto_merge: false,
              description: 'Preview deployment for PR #${{ github.event.pull_request.number }}',
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Preview environment is ready',
            });

      # Comment on PR with preview URL
      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const prNumber = context.payload.pull_request.number;

            const body = `## 🚀 Preview Deployment Ready!

            Your preview environment has been deployed successfully!

            ### Preview URL
            🔗 **[View Preview](${ url })**

            ### Deployment Details
            - **PR**: #${ prNumber }
            - **Commit**: \`${{ github.event.pull_request.head.sha.substring(0, 7) }}\`
            - **Branch**: \`${{ github.event.pull_request.head.ref }}\`
            - **Environment**: Preview
            - **Deployed at**: ${ new Date().toUTCString() }

            ### Test Checklist
            - [ ] UI/UX looks correct
            - [ ] All features work as expected
            - [ ] No console errors
            - [ ] Mobile responsive
            - [ ] Performance is acceptable

            ---
            <sub>This preview will be automatically cleaned up when the PR is closed.</sub>
            `;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = `## ❌ Preview Deployment Failed

            The preview deployment encountered an error. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            **Commit**: \`${{ github.event.pull_request.head.sha.substring(0, 7) }}\`
            **Branch**: \`${{ github.event.pull_request.head.ref }}\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
