name: Load Test (k6 Smoke)

on:
  # Manual trigger with configurable target URL
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for load test (defaults to staging)'
        required: false
        default: ''
      vus:
        description: 'Max virtual users (default: 10)'
        required: false
        default: '10'

  # Weekly schedule - runs every Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: load-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Determine target URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.STAGING_URL }}" ]; then
            echo "url=${{ secrets.STAGING_URL }}" >> $GITHUB_OUTPUT
          else
            echo "url=http://localhost:3000" >> $GITHUB_OUTPUT
            echo "needs_local_server=true" >> $GITHUB_OUTPUT
          fi

      # If no external URL is available, build and start a local server
      - name: Setup Node.js
        if: steps.target.outputs.needs_local_server == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        if: steps.target.outputs.needs_local_server == 'true'
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Build shared packages
        if: steps.target.outputs.needs_local_server == 'true'
        run: npm run build:packages

      - name: Build web app
        if: steps.target.outputs.needs_local_server == 'true'
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Start web server
        if: steps.target.outputs.needs_local_server == 'true'
        working-directory: apps/web
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        if: steps.target.outputs.needs_local_server == 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run k6 smoke test
        working-directory: apps/web/load-tests/k6
        run: |
          k6 run smoke-test.js \
            --env BASE_URL=${{ steps.target.outputs.url }} \
            --env TEST_USER_EMAIL=${{ secrets.E2E_HOMEOWNER_EMAIL }} \
            --env TEST_USER_PASSWORD=${{ secrets.E2E_HOMEOWNER_PASSWORD }} \
            --summary-export=k6-summary.json \
            2>&1 | tee k6-output.txt
        continue-on-error: true

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: k6-load-test-results
          path: |
            apps/web/load-tests/k6/load-test-results.json
            apps/web/load-tests/k6/k6-summary.json
            apps/web/load-tests/k6/k6-output.txt
          retention-days: 30

      - name: Parse results and set status
        id: results
        if: always()
        working-directory: apps/web/load-tests/k6
        run: |
          if [ -f load-test-results.json ]; then
            PASSED=$(cat load-test-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('thresholdsPassed', False))" 2>/dev/null || echo "False")
            TOTAL=$(cat load-test-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('totalRequests', 0))" 2>/dev/null || echo "0")
            FAILED=$(cat load-test-results.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('failedRequests', 0))" 2>/dev/null || echo "0")

            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "passed=Unknown" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const passed = '${{ steps.results.outputs.passed }}';
            const total = '${{ steps.results.outputs.total }}';
            const failed = '${{ steps.results.outputs.failed }}';
            const target = '${{ steps.target.outputs.url }}';

            const statusIcon = passed === 'True' ? ':white_check_mark:' : ':x:';

            const body = [
              `## ${statusIcon} Load Test Results`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Target | \`${target}\` |`,
              `| Total Requests | ${total} |`,
              `| Failed Requests | ${failed} |`,
              `| Thresholds Passed | ${passed} |`,
              '',
              '### Thresholds',
              '| Endpoint | Target |',
              '|----------|--------|',
              '| `GET /api/version` | p95 < 200ms |',
              '| `GET /api/stats/platform` | p95 < 500ms |',
              '| `POST /api/auth/login` | p95 < 1000ms |',
              '| `GET /api/jobs` | p95 < 500ms |',
              '',
              `> Full results available in the [workflow artifacts](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        env:
          HAS_SLACK: ${{ secrets.SLACK_WEBHOOK != '' }}
        run: |
          if [ "$HAS_SLACK" = "true" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Load test failed for Mintenance staging. Total requests: ${{ steps.results.outputs.total }}, Failed: ${{ steps.results.outputs.failed }}. <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View run>\"}" \
              ${{ secrets.SLACK_WEBHOOK }}
          else
            echo "Slack webhook not configured - skipping notification"
          fi

      - name: Fail if thresholds not met
        if: steps.results.outputs.passed == 'False'
        run: |
          echo "Load test thresholds were NOT met. Review the results above."
          exit 1
