name: Dependency Security Audit

# This workflow ONLY audits — it does NOT auto-update packages.
# Dependabot (.github/dependabot.yml) handles updates with per-package PRs.
# Blind `npm update` was removed as a supply chain risk.

on:
  schedule:
    # Run weekly on Sundays at 1 AM UTC
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20.19.4'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts=false

    - name: Check for outdated packages
      run: |
        npm outdated --json > outdated.json || true
        if [ -s outdated.json ]; then
          echo "::warning::Outdated packages found — review via Dependabot PRs"
          cat outdated.json
        else
          echo "All packages up to date"
        fi

    - name: Run security audit
      run: npm audit --audit-level moderate

    - name: Report audit results
      if: failure()
      run: |
        echo "::error::npm audit found vulnerabilities above moderate threshold"
        echo "Review Dependabot PRs or run 'npm audit fix' locally"
