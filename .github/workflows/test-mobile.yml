name: Mobile App Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/test-mobile.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

jobs:
  test:
    name: Test Mobile App
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint:mobile
        continue-on-error: true # Don't fail build on lint errors yet

      - name: Run type check
        run: npm run type-check:mobile
        continue-on-error: true # Don't fail build on type errors yet

      - name: Run tests
        run: |
          cd apps/mobile
          npm test -- --ci --maxWorkers=2 --passWithNoTests
        env:
          NODE_ENV: test

      - name: Generate coverage report
        if: matrix.node-version == '18.x' # Only run coverage on one version
        run: |
          cd apps/mobile
          npm test -- --coverage --coverageReporters=json-summary --maxWorkers=2
        continue-on-error: true

      - name: Coverage Summary
        if: matrix.node-version == '18.x'
        run: |
          cd apps/mobile
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Report 📊" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY

            # Extract coverage percentages
            LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            STATEMENTS=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')
            FUNCTIONS=$(cat coverage/coverage-summary.json | jq '.total.functions.pct')
            BRANCHES=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')

            # Current thresholds (will increase over time)
            THRESHOLD_LINES=15
            THRESHOLD_STATEMENTS=15
            THRESHOLD_FUNCTIONS=10
            THRESHOLD_BRANCHES=10

            # Check thresholds and add to summary
            if (( $(echo "$LINES >= $THRESHOLD_LINES" | bc -l) )); then
              echo "| Lines | ${LINES}% | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Lines | ${LINES}% | ⚠️ Below ${THRESHOLD_LINES}% |" >> $GITHUB_STEP_SUMMARY
            fi

            if (( $(echo "$STATEMENTS >= $THRESHOLD_STATEMENTS" | bc -l) )); then
              echo "| Statements | ${STATEMENTS}% | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Statements | ${STATEMENTS}% | ⚠️ Below ${THRESHOLD_STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
            fi

            if (( $(echo "$FUNCTIONS >= $THRESHOLD_FUNCTIONS" | bc -l) )); then
              echo "| Functions | ${FUNCTIONS}% | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Functions | ${FUNCTIONS}% | ⚠️ Below ${THRESHOLD_FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
            fi

            if (( $(echo "$BRANCHES >= $THRESHOLD_BRANCHES" | bc -l) )); then
              echo "| Branches | ${BRANCHES}% | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Branches | ${BRANCHES}% | ⚠️ Below ${THRESHOLD_BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Current Status" >> $GITHUB_STEP_SUMMARY
            echo "- Test infrastructure: ✅ Operational" >> $GITHUB_STEP_SUMMARY
            echo "- Passing test suites: ~213/639 (33%)" >> $GITHUB_STEP_SUMMARY
            echo "- Passing tests: ~1,923/2,445 (78%)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Note**: Coverage thresholds are currently relaxed while test infrastructure is being improved." >> $GITHUB_STEP_SUMMARY
            echo "Target coverage: 80% by end of Q1 2026" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage reports
        if: matrix.node-version == '18.x' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: apps/mobile/coverage/
          retention-days: 7

      # Future enforcement (commented out for now)
      # - name: Check coverage thresholds
      #   if: matrix.node-version == '18.x'
      #   run: |
      #     cd apps/mobile
      #     npm test -- --coverage --coverageThreshold='{"global":{"lines":30,"statements":30,"functions":25,"branches":20}}'

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Test Results Summary
        run: |
          echo "## Mobile App Test Summary 📱" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "### ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some tests are failing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This is expected while we improve test coverage." >> $GITHUB_STEP_SUMMARY
            echo "See the test job logs for details." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Continue fixing failing tests" >> $GITHUB_STEP_SUMMARY
          echo "2. Increase coverage incrementally" >> $GITHUB_STEP_SUMMARY
          echo "3. Enable strict thresholds once 30% coverage is reached" >> $GITHUB_STEP_SUMMARY