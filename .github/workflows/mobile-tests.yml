name: Mobile App Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/mobile-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Mobile Unit Tests
    runs-on: ubuntu-latest
    env:
      HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Run mobile unit tests
        working-directory: apps/mobile
        run: npm test -- --coverage --watchAll=false --maxWorkers=2 --passWithNoTests --forceExit
        env:
          CI: true

      - name: Generate coverage report
        working-directory: apps/mobile
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm test -- --coverage --coverageReporters=text --watchAll=false | tee coverage-output.txt
          cat coverage-output.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/mobile/coverage/lcov.info
          flags: mobile-unittests
          name: mobile-coverage
          fail_ci_if_error: false
        continue-on-error: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mobile-test-results
          path: |
            apps/mobile/coverage/
            apps/mobile/test-results/
          retention-days: 30

      - name: Check coverage thresholds
        working-directory: apps/mobile
        run: |
          node -e "
            const coverage = require('./coverage/coverage-summary.json');
            const total = coverage.total;

            console.log('Coverage Summary:');
            console.log('Lines:', total.lines.pct + '%');
            console.log('Statements:', total.statements.pct + '%');
            console.log('Functions:', total.functions.pct + '%');
            console.log('Branches:', total.branches.pct + '%');

            // Services should have 80%+ coverage
            const serviceFiles = Object.keys(coverage).filter(f => f.includes('/services/'));
            let serviceCoverage = { lines: 0, statements: 0, functions: 0, branches: 0, count: 0 };

            serviceFiles.forEach(file => {
              const cov = coverage[file];
              serviceCoverage.lines += cov.lines.pct;
              serviceCoverage.statements += cov.statements.pct;
              serviceCoverage.functions += cov.functions.pct;
              serviceCoverage.branches += cov.branches.pct;
              serviceCoverage.count++;
            });

            if (serviceCoverage.count > 0) {
              console.log('\\nService Coverage (Average):');
              console.log('Lines:', (serviceCoverage.lines / serviceCoverage.count).toFixed(2) + '%');
              console.log('Statements:', (serviceCoverage.statements / serviceCoverage.count).toFixed(2) + '%');
              console.log('Functions:', (serviceCoverage.functions / serviceCoverage.count).toFixed(2) + '%');
              console.log('Branches:', (serviceCoverage.branches / serviceCoverage.count).toFixed(2) + '%');
            }
          "

  integration-tests:
    name: Mobile Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Run integration tests
        working-directory: apps/mobile
        run: npm test -- --testPathPattern=integration --watchAll=false --maxWorkers=2 --passWithNoTests --forceExit
        env:
          CI: true

      - name: Archive integration test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-results
          path: apps/mobile/test-results/
          retention-days: 30

  service-tests:
    name: Service Layer Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Run service tests
        working-directory: apps/mobile
        run: npm test -- --testPathPattern=services --coverage --watchAll=false --maxWorkers=2 --passWithNoTests --forceExit
        env:
          CI: true

      - name: Validate service test coverage
        working-directory: apps/mobile
        run: |
          node -e "
            const coverage = require('./coverage/coverage-summary.json');
            const serviceFiles = Object.keys(coverage).filter(f => f.includes('/services/'));

            let totalCoverage = { lines: 0, count: 0 };
            serviceFiles.forEach(file => {
              const cov = coverage[file];
              totalCoverage.lines += cov.lines.pct;
              totalCoverage.count++;
            });

            const avgCoverage = totalCoverage.count > 0 ? totalCoverage.lines / totalCoverage.count : 0;
            console.log('Service Coverage:', avgCoverage.toFixed(2) + '%');

            if (avgCoverage < 75) {
              console.error('❌ Service coverage below 75% threshold');
              console.error('⚠️  Warning: Coverage threshold not met. Consider adding more tests.');
              // Don't fail workflow, but log warning
              // process.exit(1);
            } else {
              console.log('✅ Service coverage meets 75% threshold');
            }
          "

  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:packages
      - uses: android-actions/setup-android@v3
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: ~/.android/avd/*
          key: avd-pixel-8-api-34-${{ runner.os }}
      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_8
          script: echo "AVD ready"
      - name: Build debug APK
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_STAGING }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}
        run: npm run e2e:build:android
      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_8
          disable-animations: true
          script: cd apps/mobile && npm run e2e:test:android
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: detox-android-results
          path: apps/mobile/artifacts/
          retention-days: 7

  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:packages
      - run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
      - run: pod install
        working-directory: apps/mobile/ios
      - name: Build iOS app
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_STAGING }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}
        run: npm run e2e:build:ios
      - run: npm run e2e:test:ios
        working-directory: apps/mobile
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: detox-ios-results
          path: apps/mobile/artifacts/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, service-tests, e2e-android, e2e-ios]
    if: always()

    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v5
        with:
          name: mobile-test-results
          path: test-results

      - name: Generate test summary
        run: |
          echo "# 📊 Mobile Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All test jobs completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Jobs Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Service Tests: ${{ needs.service-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Android: ${{ needs.e2e-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E iOS: ${{ needs.e2e-ios.result }}" >> $GITHUB_STEP_SUMMARY

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, service-tests, e2e-android, e2e-ios]
    if: github.event_name == 'pull_request'

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.service-tests.result }}" != "success" ] || \
             ([ "${{ needs.e2e-android.result }}" != "success" ] && [ "${{ needs.e2e-android.result }}" != "skipped" ]) || \
             ([ "${{ needs.e2e-ios.result }}" != "success" ] && [ "${{ needs.e2e-ios.result }}" != "skipped" ]); then
            echo "❌ Tests failed - blocking PR"
            exit 1
          else
            echo "✅ All tests passed - PR can be merged"
          fi

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const unitTests = '${{ needs.unit-tests.result }}';
            const integrationTests = '${{ needs.integration-tests.result }}';
            const serviceTests = '${{ needs.service-tests.result }}';
            const e2eAndroid = '${{ needs.e2e-android.result }}';
            const e2eIos = '${{ needs.e2e-ios.result }}';

            const statusEmoji = (status) => status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';

            const comment = `## 🧪 Test Results

            ${statusEmoji(unitTests)} **Unit Tests**: ${unitTests}
            ${statusEmoji(integrationTests)} **Integration Tests**: ${integrationTests}
            ${statusEmoji(serviceTests)} **Service Tests**: ${serviceTests}
            ${statusEmoji(e2eAndroid)} **E2E Android**: ${e2eAndroid}
            ${statusEmoji(e2eIos)} **E2E iOS**: ${e2eIos}

            ${unitTests === 'success' && integrationTests === 'success' && serviceTests === 'success'
              ? '✅ All tests passed! This PR is ready to merge.'
              : '❌ Some tests failed. Please fix the issues before merging.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
