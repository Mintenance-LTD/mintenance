name: Integration Tests (Real DB)

# Runs real-DB integration tests against a local Supabase instance spun up in CI.
# Complements the mock-based tests in quality-checks with actual RLS/constraint verification.
#
# See docs/TESTING_INTEGRATION.md for the full guide.

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'apps/web/__tests__/integration-real/**'
      - 'apps/web/test/integration/**'
      - 'apps/web/vitest.integration.config.ts'
      - 'apps/web/scripts/run-integration-tests.js'
      - 'apps/web/lib/services/escrow/**'
      - 'apps/web/lib/services/notifications/**'
      - 'apps/web/lib/services/payments/**'
      - 'apps/web/lib/services/contracts/**'
      - 'apps/web/lib/services/agents/escrow/**'
      - 'apps/web/lib/api/with-api-handler.ts'
      - 'supabase/migrations/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'apps/web/__tests__/integration-real/**'
      - 'apps/web/test/integration/**'
      - 'apps/web/vitest.integration.config.ts'
      - 'apps/web/scripts/run-integration-tests.js'
      - 'apps/web/lib/services/escrow/**'
      - 'apps/web/lib/services/notifications/**'
      - 'apps/web/lib/services/payments/**'
      - 'apps/web/lib/services/contracts/**'
      - 'apps/web/lib/services/agents/escrow/**'
      - 'apps/web/lib/api/with-api-handler.ts'
      - 'supabase/migrations/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests (Real DB)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: Install Supabase CLI
        uses: supabase/setup-cli@8e24e7f81eb07a23f63a88cf52e0586f3a498945 # v1
        with:
          version: latest

      - name: Start Supabase stack
        run: supabase start
        # Supabase CLI spins up Postgres + GoTrue + PostgREST in Docker.
        # Uses ports 54321 (REST), 54322 (Postgres), 54323 (Studio).
        # Migrations in supabase/migrations/ are applied automatically.

      - name: Verify Supabase is up
        run: |
          curl -f http://localhost:54321/rest/v1/ \
            -H "apikey: $(supabase status --output json | jq -r '.anon_key // empty')" \
            || (echo "Supabase REST API not responding" && supabase status && exit 1)

      - name: Run integration tests
        working-directory: apps/web
        run: npm run test:integration
        env:
          INTEGRATION_TESTS: '1'
          # Supabase CLI generates these deterministically on local start.
          # They are NOT production keys.
          SUPABASE_TEST_URL: http://localhost:54321

      - name: Dump Supabase logs on failure
        if: failure()
        run: supabase status && docker ps && docker logs supabase_db_mintenance-clean 2>&1 | tail -100 || true

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
