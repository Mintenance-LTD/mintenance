name: Security Scan

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      HAS_SNYK: ${{ secrets.SNYK_TOKEN != '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20.19.4'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts=false
      timeout-minutes: 10

    - name: Run security audit
      # 2026-05-30: aligned to `high` (matches ci-cd.yml). The 25 remaining
      # moderate advisories are all transitive build/dev tooling (expo
      # toolchain, @remotion/*, @google-cloud/storage→gaxios, next→postcss)
      # with no non-breaking fix; `npm audit fix --force` would force expo/next
      # major bumps. Block on high/critical (currently clean); triage moderates
      # via the uploaded security-reports artifact + scheduled Snyk run.
      run: npm audit --audit-level high

    - name: Run Snyk security scan
      if: ${{ env.HAS_SNYK == 'true' }}
      uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true
      with:
        args: --severity-threshold=high

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4

    - name: Run ESLint security rules
      run: |
        cd apps/web
        npx eslint . --ext .ts,.tsx --format json --output-file eslint-security-report.json || true

    - name: Check for secrets (TruffleHog)
      uses: trufflesecurity/trufflehog@bff3d2670b362bbb4a0bcdeffea146cbc2ad3abd # main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    # Gitleaks runs our custom .gitleaks.toml which catches Google AIza keys,
    # Firebase FCM legacy server keys, Expo push tokens, and other patterns
    # TruffleHog's --only-verified mode does not detect. Does NOT block PRs
    # (continue-on-error) — use the artifact to triage findings.
    - name: Check for secrets (Gitleaks)
      uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_CONFIG: .gitleaks.toml
        GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
        GITLEAKS_ENABLE_COMMENTS: true

    - name: Run dependency check
      run: |
        cd apps/web
        npx depcheck --ignores="@types/*,eslint-*,prettier,*test*,*spec*" || true

    - name: Upload security reports
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      if: always()
      with:
        name: security-reports
        path: |
          apps/web/eslint-security-report.json
          apps/web/snyk.sarif
        retention-days: 30

    - name: Comment PR with security findings
      if: github.event_name == 'pull_request'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let comment = '## 🔒 Security Scan Results\n\n';
          
          // Check for ESLint security report
          const eslintReportPath = 'apps/web/eslint-security-report.json';
          if (fs.existsSync(eslintReportPath)) {
            const eslintReport = JSON.parse(fs.readFileSync(eslintReportPath, 'utf8'));
            const securityIssues = eslintReport.filter(issue => 
              issue.messages.some(msg => 
                msg.ruleId && (
                  msg.ruleId.includes('security') || 
                  msg.ruleId.includes('xss') || 
                  msg.ruleId.includes('injection')
                )
              )
            );
            
            if (securityIssues.length > 0) {
              comment += `⚠️ **${securityIssues.length} security-related ESLint issues found**\n\n`;
            } else {
              comment += '✅ **No security-related ESLint issues found**\n\n';
            }
          }
          
          // Add general security recommendations
          comment += `
          ### Security Checklist
          - [ ] Input validation implemented
          - [ ] XSS protection enabled
          - [ ] CSRF protection configured
          - [ ] SQL injection prevention
          - [ ] Authentication security reviewed
          - [ ] Authorization checks implemented
          - [ ] Rate limiting configured
          - [ ] Security headers set
          - [ ] Dependencies updated
          - [ ] Secrets not committed
          
          ### Next Steps
          1. Review any security findings above
          2. Address high/critical severity issues
          3. Update dependencies if needed
          4. Test security controls
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  database-security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Setup Supabase CLI
      run: |
        npm install -g supabase
        supabase --version

    - name: Run database security checks
      run: |
        # Check for sensitive data exposure
        echo "Checking for sensitive data in migrations..."
        find supabase/migrations -name "*.sql" -exec grep -l "password\|secret\|key\|token" {} \; || true
        
        # Check RLS policies
        echo "Checking RLS policies..."
        supabase db diff --schema public > db-diff.txt || true
        
        # Check for admin functions
        echo "Checking admin functions..."
        grep -r "SECURITY DEFINER" supabase/migrations/ || true

    - name: Upload database security report
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: database-security-report
        path: |
          db-diff.txt
        retention-days: 30

  notify-security-team:
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    needs: [security-scan, database-security-scan]
    env:
      # secrets context isn't allowed inside step-level `if:` expressions, so
      # lift the presence check into a job-level env (same pattern as HAS_SNYK
      # on line 21). Without this, the whole workflow fails YAML validation.
      HAS_SLACK: ${{ secrets.SLACK_WEBHOOK != '' }}

    steps:
    - name: Notify security team
      if: env.HAS_SLACK == 'true'
      uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
      with:
        status: failure
        channel: '#security-alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          Security scan failed for Mintenance
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Please review the security reports and address any critical issues.
