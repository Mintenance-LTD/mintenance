name: Mintenance CI/CD Pipeline

# Quality Gates (see docs/CI_QUALITY_GATES.md)
#
#   quality-checks  ──► pr-quality-gate  ──► MERGE BLOCKED if fails
#        │
#        ├─ TypeScript must compile
#        ├─ ESLint must pass
#        ├─ Web + Mobile tests must pass
#        └─ Coverage thresholds (70/65/70/70) auto-enforced by vitest/jest
#
# Branch protection MUST require these status checks:
#   - "Code Quality & Testing"
#   - "PR Quality Gate"
#   - "E2E Tests" (from e2e-tests.yml)
#   - "Performance & Security Monitoring"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    env:
      HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: TypeScript compilation check
        run: npm run type-check

      - name: Lint (web)
        run: npm run lint:web

      - name: Lint (mobile)
        run: npm run lint:mobile

      - name: Check no untracked skipped tests (diff only)
        run: node scripts/ci/check-no-skip.js --diff
        if: github.event_name == 'pull_request'

      - name: Run web tests (fails on coverage regression below thresholds)
        run: npm run test:web -- run --coverage

      - name: Run mobile tests (fails on coverage regression below thresholds)
        run: npm run test:mobile -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV == 'true' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level high

  mobile-pr-smoke:
    name: Mobile E2E Smoke (PR)
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect mobile changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/shared/**'
              - 'packages/shared-ui/**'
              - 'packages/types/**'

      - name: Setup Node.js
        if: steps.filter.outputs.mobile == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        if: steps.filter.outputs.mobile == 'true'
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Setup Java for Android
        if: steps.filter.outputs.mobile == 'true'
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM
        if: steps.filter.outputs.mobile == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Detox smoke tests (auth + navigation only)
        if: steps.filter.outputs.mobile == 'true'
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f0bc8937c1596d5b2203 # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          script: |
            cd apps/mobile
            npm run e2e:build:android
            npx detox test --configuration android.emu.debug --testNamePattern="auth|navigation"

      - name: Skip (no mobile changes)
        if: steps.filter.outputs.mobile != 'true'
        run: echo "No mobile code changed — skipping Detox smoke tests."

  mobile-testing:
    name: Mobile E2E Testing
    runs-on: macos-latest
    needs: quality-checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts=false

      - name: Setup Java for Android
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f3f2d4b9464 # v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Create Android Emulator
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-34;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n test -k "system-images;android-34;google_apis;x86_64"

      - name: Start Android Emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test -no-snapshot -no-window -camera-back none -camera-front none -selinux permissive -qemu -m 2048 &
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed | tr -d "\r") ]]; do sleep 1; done; input keyevent 82'

      - name: Run Detox E2E tests
        run: |
          npm run e2e:build:android
          npm run e2e:test:android
        env:
          DETOX_CONFIGURATION: android.emu.debug

  build-staging:
    name: Build Staging Apps
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      HAS_EXPO: ${{ secrets.EXPO_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@f7ab52df0e03970fe1e260a2a5307c8f4dbd2587 # v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: Build staging Android
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform android --profile staging --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Staging build status
        run: |
          echo "📱 Staging build triggered for develop branch"
          echo "Check EAS dashboard for build status"

  build-production:
    name: Build Production Apps
    runs-on: ubuntu-latest
    needs: quality-checks
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    env:
      HAS_EXPO: ${{ secrets.EXPO_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@f7ab52df0e03970fe1e260a2a5307c8f4dbd2587 # v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: Build production Android
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform android --profile production --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build production iOS
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform ios --profile production --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Production build status
        run: |
          echo "🚀 Production builds triggered for main branch"
          echo "Check EAS dashboard for build status"
          echo "Manual app store submission required after build completes:"
          echo "  eas submit --platform android --latest"
          echo "  eas submit --platform ios --latest"

  # NOTE: Set EXPO_TOKEN secret in GitHub repository settings for automated builds

  performance-monitoring:
    name: Performance & Security Monitoring
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts=false
        timeout-minutes: 10

      - name: Run performance tests
        run: npm run test -- --testPathPattern=performance

      - name: Bundle size analysis
        run: |
          npm install -g @expo/cli
          expo export --platform android --output-dir dist
          du -sh dist/
          echo "Bundle size analysis completed"

      - name: Dependency vulnerability scan
        run: |
          npm audit --json > audit-results.json || true
          cat audit-results.json

      - name: License compliance check
        run: |
          npm install -g license-checker
          license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC' --summary

  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    needs: [quality-checks, performance-monitoring, mobile-pr-smoke]
    if: github.event_name == 'pull_request'
    # Always runs so a failure in any upstream job produces a failing required check.
    # Mobile smoke is a "success-or-skipped" gate (skipped when no mobile files change).

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.quality-checks.result }}" != "success" ] || \
             [ "${{ needs.performance-monitoring.result }}" != "success" ] || \
             [ "${{ needs.mobile-pr-smoke.result }}" = "failure" ]; then
            echo "❌ Quality checks failed - PR cannot be merged"
            echo "  quality-checks: ${{ needs.quality-checks.result }}"
            echo "  performance-monitoring: ${{ needs.performance-monitoring.result }}"
            echo "  mobile-pr-smoke: ${{ needs.mobile-pr-smoke.result }}"
            exit 1
          else
            echo "✅ All quality checks passed - PR ready for review"
          fi

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const qualityChecks = '${{ needs.quality-checks.result }}';
            const performanceMonitoring = '${{ needs.performance-monitoring.result }}';
            const mobileSmoke = '${{ needs.mobile-pr-smoke.result }}';

            const statusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'skipped') return '⏭️';
              return '❌';
            };

            const comment = `## 🔍 CI/CD Pipeline Results

            ${statusEmoji(qualityChecks)} **Code Quality & Testing**: ${qualityChecks}
            ${statusEmoji(performanceMonitoring)} **Performance & Security**: ${performanceMonitoring}
            ${statusEmoji(mobileSmoke)} **Mobile E2E Smoke**: ${mobileSmoke}

            ---

            ${qualityChecks === 'success' && performanceMonitoring === 'success' && mobileSmoke !== 'failure'
              ? '✅ **All checks passed!** This PR is ready for review and merge.'
              : '❌ **Some checks failed.** Please review the failed jobs and fix the issues.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: quality-checks
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      HAS_SLACK: ${{ secrets.SLACK_WEBHOOK != '' }}

    steps:
      - name: Notify team
        if: ${{ env.HAS_SLACK == 'true' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
        with:
          status: ${{ job.status }}
          channel: '#mintenance-deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow