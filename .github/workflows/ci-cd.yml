  build-staging:
    name: Build Staging Apps
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      HAS_EXPO: ${{ secrets.EXPO_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: Build staging Android
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform android --profile staging --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Staging build status
        run: |
          echo "📱 Staging build triggered for develop branch"
          echo "Check EAS dashboard for build status"

  build-production:
    name: Build Production Apps
    runs-on: ubuntu-latest
    needs: quality-checks
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    env:
      HAS_EXPO: ${{ secrets.EXPO_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build shared packages
        run: npm run build:packages

      - name: Build production Android
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform android --profile production --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Build production iOS
        if: ${{ env.HAS_EXPO == 'true' }}
        run: eas build --platform ios --profile production --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      - name: Production build status
        run: |
          echo "🚀 Production builds triggered for main branch"
          echo "Check EAS dashboard for build status"
          echo "Manual app store submission required after build completes:"
          echo "  eas submit --platform android --latest"
          echo "  eas submit --platform ios --latest"

  # NOTE: Set EXPO_TOKEN secret in GitHub repository settings for automated builds

  performance-monitoring:
    name: Performance & Security Monitoring
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Run performance tests
        run: npm run test -- --testPathPattern=performance

      - name: Bundle size analysis
        run: |
          npm install -g @expo/cli
          expo export --platform android --output-dir dist
          du -sh dist/
          echo "Bundle size analysis completed"

      - name: Dependency vulnerability scan
        run: |
          npm audit --json > audit-results.json || true
          cat audit-results.json

      - name: License compliance check
        run: |
          npm install -g license-checker
          license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC' --summary

  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    needs: [quality-checks, performance-monitoring]
    if: github.event_name == 'pull_request'

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.quality-checks.result }}" != "success" ] || \
             [ "${{ needs.performance-monitoring.result }}" != "success" ]; then
            echo "❌ Quality checks failed - PR cannot be merged"
            exit 1
          else
            echo "✅ All quality checks passed - PR ready for review"
          fi

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            const qualityChecks = '${{ needs.quality-checks.result }}';
            const performanceMonitoring = '${{ needs.performance-monitoring.result }}';

            const statusEmoji = (status) => status === 'success' ? '✅' : '❌';

            const comment = `## 🔍 CI/CD Pipeline Results

            ${statusEmoji(qualityChecks)} **Code Quality & Testing**: ${qualityChecks}
            ${statusEmoji(performanceMonitoring)} **Performance & Security**: ${performanceMonitoring}

            ---

            ${qualityChecks === 'success' && performanceMonitoring === 'success'
              ? '✅ **All checks passed!** This PR is ready for review and merge.'
              : '❌ **Some checks failed.** Please review the failed jobs and fix the issues.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

