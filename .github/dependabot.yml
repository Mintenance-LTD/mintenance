version: 2
updates:
  # npm workspaces monorepo.
  #
  # This repo has a single lockfile at /package-lock.json; the workspace
  # package.json files under apps/* and packages/* have none of their own.
  # Dependabot only regenerates the lockfile that lives in its `directory`, so
  # per-workspace `directory:` entries bumped a package.json with no lock to
  # reconcile and drifted the two apart permanently. This single root entry
  # resolves every workspace manifest against the root lock and updates them
  # together. Do NOT re-add per-workspace npm entries.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "📦"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # Prioritize security updates over feature updates
    versioning-strategy: increase
    groups:
      development-dependencies:
        patterns:
          - "@types/*"
          - "typescript"
          - "eslint*"
          - "prettier"
          - "@typescript-eslint/*"
        update-types:
          - "minor"
          - "patch"
      testing-dependencies:
        patterns:
          - "jest*"
          - "@jest/*"
          - "@testing-library/*"
          - "playwright"
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"
      next-ecosystem:
        patterns:
          - "next"
          - "next-*"
          - "eslint-config-next"
        update-types:
          - "minor"
          - "patch"
      react-ecosystem:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
        update-types:
          - "patch"
      supabase:
        patterns:
          - "@supabase/*"
        update-types:
          - "minor"
          - "patch"
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - "minor"
          - "patch"
      react-native:
        patterns:
          - "react-native"
          - "react-native-*"
          - "@react-native/*"
          - "@react-native-community/*"
        update-types:
          - "minor"
          - "patch"
      # Expo SDK modules are only coherent as a set — group them so a bump to
      # one expo-* package can never land without its siblings.
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions. Same `directory: "/"` as the npm entry above, which is
  # correct and not a duplicate: Dependabot keys entries by
  # (package-ecosystem, directory), and this one reads .github/workflows/*.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "⚙️"
      include: "scope"
    labels:
      - "github-actions"
      - "ci/cd"
      - "automated"
